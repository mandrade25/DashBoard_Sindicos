server {
    listen 80;
    # Domínio real em produção. "dashboard.minimerx.com.br" não tem DNS configurado.
    server_name minimerx.com.br www.minimerx.com.br;

    client_max_body_size 25M;

    # ─── Arquivos estáticos do Next.js (chunks com hash de conteúdo) ────────────
    # Esses arquivos têm nomes únicos por build — cache longo é seguro e correto.
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Permite que o Next.js defina cache-control longo para os chunks
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Rotas dinâmicas (HTML, RSC payloads, APIs) ─────────────────────────────
    # NUNCA cachear: cada resposta depende de sessão/dados em tempo real.
    # Isso impede que o Cloudflare sirva um RSC payload antigo que aponte para
    # um chunk de layout de uma build anterior.
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Garante que o Cloudflare e outros proxies não cacheiem HTML/RSC dinâmico
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
    }
}

# ─── Após obter certificado SSL com Certbot ──────────────────────────────────
# Execute: sudo certbot --nginx -d minimerx.com.br -d www.minimerx.com.br
# O Certbot reescreve o bloco acima adicionando listen 443 ssl e redirect 80→443.
#
# Lembrete: atualizar NEXTAUTH_URL no .env para https://minimerx.com.br
